<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <div class="card-1">
        <img class="img-bg" src="./images/pattern-bg.svg" alt="" />
        <img
          id="image"
          class="img-tanya"
          src="./images/image-tanya.jpg"
          alt=""
        />
        <button class="button-prev">
          <img class="icon-prev" src="./images/icon-prev.svg" alt="" />
        </button>
        <button class="button-next">
          <img class="icon-next" src="./images/icon-next.svg" alt="" />
        </button>
      </div>

      <div class="card-2">
        <img class="img-quotes" src="./images/pattern-quotes.svg" alt="" />
        <div class="text-card">
          <p id="content" class="text"></p>
        </div>
        <div class="text-card-2">
          <h1 id="name"></h1>
          <span id="job"></span>
        </div>
      </div>
      <img class="img-curve" src="./images/pattern-curve.svg" alt="" />
    </main>
    <script src="script.js"></script>
  </body>
</html>
